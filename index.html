<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MUSQ World Perfumes</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Poppins',sans-serif;
    background:#fff;
    overflow-x:hidden;
}

/* =========================
   PREMIUM LUXURY LOADER
========================= */

.loader{
    position:fixed;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    background:
    radial-gradient(circle at top,#f7fff9,#ffffff);

    overflow:hidden;

    z-index:99999;

    transition:
    opacity 1s ease,
    visibility 1s ease;
}

.loader.hide{
    opacity:0;
    visibility:hidden;
}

/* BACKGROUND LIGHT */

.loader::before{
    content:'';

    position:absolute;

    width:420px;
    height:420px;

    border-radius:50%;

    background:
    radial-gradient(
        circle,
        rgba(20,128,67,0.18),
        transparent 70%
    );

    animation:
    glowPulse 4s ease-in-out infinite;
}

/* MAIN ROTATING CIRCLE */

.loader-circle{
    position:relative;

    width:130px;
    height:130px;

    border-radius:50%;

    border:
    4px solid rgba(20,128,67,0.08);

    border-top:
    4px solid #148043;

    border-right:
    4px solid #25b865;

    animation:
    spin 1.2s linear infinite,
    zoomPulse 2.2s ease-in-out infinite;

    box-shadow:
    0 0 45px rgba(20,128,67,0.22),
    inset 0 0 25px rgba(20,128,67,0.08);

    backdrop-filter:blur(10px);
}

/* INNER CIRCLE */

.loader-circle::before{
    content:'';

    position:absolute;

    inset:14px;

    border-radius:50%;

    border:
    3px solid rgba(20,128,67,0.08);

    border-bottom:
    3px solid #148043;

    animation:
    reverseSpin 2s linear infinite;
}

/* CENTER DOT */

.loader-circle::after{
    content:'';

    position:absolute;

    width:16px;
    height:16px;

    background:#148043;

    border-radius:50%;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    box-shadow:
    0 0 20px rgba(20,128,67,0.6);
}

/* BRAND TEXT */

.loader-text{
    margin-top:34px;

    font-size:40px;

    letter-spacing:10px;

    font-family:'Cormorant Garamond',serif;

    font-weight:700;

    color:#148043;

    animation:
    textGlow 2.5s ease-in-out infinite;
}

.loader-sub{
    margin-top:10px;

    font-size:13px;

    letter-spacing:5px;

    color:#666;

    text-transform:uppercase;
}

/* ANIMATIONS */

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

@keyframes reverseSpin{
    100%{
        transform:rotate(-360deg);
    }
}

@keyframes zoomPulse{
    0%,100%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.08);
    }
}

@keyframes glowPulse{

    0%,100%{
        transform:scale(1);
        opacity:0.5;
    }

    50%{
        transform:scale(1.2);
        opacity:1;
    }
}

@keyframes textGlow{

    0%,100%{
        opacity:0.8;
        letter-spacing:10px;
    }

    50%{
        opacity:1;
        letter-spacing:14px;
    }
}

/* DEMO PAGE */

.demo{
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    flex-direction:column;

    text-align:center;

    padding:40px;
}

.demo h1{
    font-size:70px;

    font-family:'Cormorant Garamond',serif;

    margin-bottom:20px;
}

.demo p{
    color:#666;

    max-width:700px;

    line-height:1.9;
}

/* MOBILE */

@media(max-width:768px){

.loader-circle{
    width:105px;
    height:105px;
}

.loader-text{
    font-size:30px;
    letter-spacing:7px;
}

.demo h1{
    font-size:46px;
}

}

</style>
</head>

<body>

<!-- =========================
     PREMIUM LOADER
========================= -->

<div class="loader">

    <div class="loader-circle"></div>

    <div class="loader-text">
        MUSQ
    </div>

    <div class="loader-sub">
        Luxury Perfume Experience
    </div>

</div>

<!-- DEMO CONTENT -->

<section class="demo">

    <h1>
        MUSQ World Perfumes
    </h1>

    <p>
        Premium fragrance collections crafted for luxury businesses,
        global wholesale markets, and modern perfume brands.
    </p>

</section>

<script>

/* PREMIUM LOADER */

window.addEventListener("load",()=>{

setTimeout(()=>{

document.querySelector(".loader")
.classList.add("hide");

},1800);

});

</script>

</body>
</html>
