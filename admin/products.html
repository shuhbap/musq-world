<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MUSQ ERP - Products</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#060606;
      color:white;
      display:flex;
      min-height:100vh;
    }

    /* SIDEBAR */

    .sidebar{
      width:260px;
      background:#0d0d0d;
      border-right:1px solid rgba(255,255,255,0.05);
      padding:30px 20px;
      position:fixed;
      height:100vh;
    }

    .logo{
      font-size:28px;
      font-weight:700;
      margin-bottom:40px;
      color:#148043;
      letter-spacing:2px;
    }

    .menu{
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .menu a{
      text-decoration:none;
      color:#d1d1d1;
      padding:15px;
      border-radius:14px;
      transition:0.3s;
      font-size:15px;
    }

    .menu a:hover{
      background:#148043;
      color:white;
      transform:translateX(5px);
    }

    .menu .active{
      background:#148043;
      color:white;
    }

    /* MAIN */

    .main{
      margin-left:260px;
      width:100%;
      padding:30px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
    }

    .topbar h1{
      font-size:32px;
    }

    .add-btn{
      background:#148043;
      color:white;
      border:none;
      padding:14px 22px;
      border-radius:14px;
      cursor:pointer;
      font-size:15px;
      transition:0.3s;
    }

    .add-btn:hover{
      transform:scale(1.05);
    }

    /* PRODUCT GRID */

    .product-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:20px;
    }

    .product-card{
      background:#101010;
      border:1px solid rgba(255,255,255,0.05);
      border-radius:22px;
      overflow:hidden;
      transition:0.3s;
    }

    .product-card:hover{
      transform:translateY(-6px);
      border-color:#148043;
    }

    .product-image{
      width:100%;
      height:240px;
      object-fit:cover;
      background:#1a1a1a;
    }

    .product-content{
      padding:20px;
    }

    .product-content h2{
      font-size:22px;
      margin-bottom:10px;
    }

    .category{
      color:#148043;
      font-size:14px;
      margin-bottom:16px;
    }

    .details{
      display:flex;
      justify-content:space-between;
      margin-bottom:20px;
      color:#d5d5d5;
      font-size:14px;
    }

    .actions{
      display:flex;
      gap:10px;
    }

    .edit-btn,
    .delete-btn{
      flex:1;
      padding:12px;
      border:none;
      border-radius:12px;
      cursor:pointer;
      transition:0.3s;
      font-weight:600;
    }

    .edit-btn{
      background:#148043;
      color:white;
    }

    .delete-btn{
      background:#1f1f1f;
      color:#ff4d4d;
      border:1px solid rgba(255,255,255,0.08);
    }

    .edit-btn:hover,
    .delete-btn:hover{
      transform:translateY(-2px);
    }

    /* STOCK STATUS */

    .stock{
      margin-top:12px;
      font-size:14px;
      color:#16c05d;
    }

    .low-stock{
      color:#ffae00;
    }

    /* MOBILE */

    @media(max-width:900px){

      .sidebar{
        width:90px;
        padding:20px 10px;
      }

      .logo{
        font-size:18px;
      }

      .menu a{
        font-size:12px;
        padding:12px;
      }

      .main{
        margin-left:90px;
        padding:20px;
      }

      .topbar{
        flex-direction:column;
        align-items:flex-start;
        gap:20px;
      }

    }

  </style>

</head>
<body>

  <!-- SIDEBAR -->

  <div class="sidebar">

    <div class="logo">
      MUSQ ERP
    </div>

    <div class="menu">
      <a href="dashboard.html">Dashboard</a>
      <a href="products.html" class="active">Products</a>
      <a href="inventory.html">Inventory</a>
      <a href="sales.html">Sales</a>
      <a href="staff.html">Staff</a>
      <a href="reports.html">Reports</a>
      <a href="#">Logout</a>
    </div>

  </div>

  <!-- MAIN -->

  <div class="main">

    <div class="topbar">

      <h1>Products</h1>

      <button class="add-btn">
        + Add Product
      </button>

    </div>

    <!-- PRODUCT GRID -->

    <div class="product-grid">

      <!-- PRODUCT 1 -->

      <div class="product-card">

        <img
          src="https://images.unsplash.com/photo-1594035910387-fea47794261f?q=80&w=1200&auto=format&fit=crop"
          class="product-image"
        >

        <div class="product-content">

          <h2>Royal Oud</h2>

          <div class="category">
            Luxury Oud
          </div>

          <div class="details">
            <span>₹999</span>
            <span>Stock: 120</span>
          </div>

          <div class="actions">
            <button class="edit-btn">Edit</button>
            <button class="delete-btn">Delete</button>
          </div>

          <div class="stock">
            In Stock
          </div>

        </div>

      </div>

      <!-- PRODUCT 2 -->

      <div class="product-card">

        <img
          src="https://images.unsplash.com/photo-1541643600914-78b084683601?q=80&w=1200&auto=format&fit=crop"
          class="product-image"
        >

        <div class="product-content">

          <h2>MUSQ Black</h2>

          <div class="category">
            Arabian Collection
          </div>

          <div class="details">
            <span>₹1,299</span>
            <span>Stock: 45</span>
          </div>

          <div class="actions">
            <button class="edit-btn">Edit</button>
            <button class="delete-btn">Delete</button>
          </div>

          <div class="stock">
            In Stock
          </div>

        </div>

      </div>

      <!-- PRODUCT 3 -->

      <div class="product-card">

        <img
          src="https://images.unsplash.com/photo-1523293182086-7651a899d37f?q=80&w=1200&auto=format&fit=crop"
          class="product-image"
        >

        <div class="product-content">

          <h2>Desert Night</h2>

          <div class="category">
            Premium Attar
          </div>

          <div class="details">
            <span>₹799</span>
            <span>Stock: 12</span>
          </div>

          <div class="actions">
            <button class="edit-btn">Edit</button>
            <button class="delete-btn">Delete</button>
          </div>

          <div class="stock low-stock">
            Low Stock
          </div>

        </div>

      </div>

      <!-- PRODUCT 4 -->

      <div class="product-card">

        <img
          src="https://images.unsplash.com/photo-1615634260167-c8cdede054de?q=80&w=1200&auto=format&fit=crop"
          class="product-image"
        >

        <div class="product-content">

          <h2>Velvet Rose</h2>

          <div class="category">
            Floral Series
          </div>

          <div class="details">
            <span>₹1,499</span>
            <span>Stock: 88</span>
          </div>

          <div class="actions">
            <button class="edit-btn">Edit</button>
            <button class="delete-btn">Delete</button>
          </div>

          <div class="stock">
            In Stock
          </div>

        </div>

      </div>

    </div>

  </div>

</body>
</html>
